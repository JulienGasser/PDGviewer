<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrouille des Glaciers - Visualisation</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Panneau latéral gauche -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Patrouille des Glaciers 2026</h1>
                <div class="race-stats">
                    <span class="stat-item" id="active-teams">0 équipes</span>
                </div>
            </div>

            <!-- Filtres par course -->
            <div class="filter-section">
                <h3>Courses</h3>
                <div class="race-filters" id="race-filters">
                    <!-- Généré dynamiquement -->
                </div>
            </div>

            <!-- Filtres par heure de départ -->
            <div class="filter-section">
                <h3>Heures de départ</h3>
                <div class="start-time-filters" id="start-time-filters">
                    <!-- Généré dynamiquement -->
                </div>
            </div>

            <!-- Recherche -->
            <div class="filter-section">
                <input 
                    type="text" 
                    id="team-search" 
                    placeholder="Rechercher par nom ou dossard..."
                    autocomplete="off"
                >
            </div>

            <!-- Liste des équipes -->
            <div class="teams-list" id="teams-list">
                <!-- Généré dynamiquement -->
            </div>
        </aside>

        <!-- Zone principale -->
        <main class="main-content">
            <!-- Contrôles temporels flottants -->
            <div class="timeline-controls-floating">
                <div class="timeline-row-1">
                    <div class="time-display" id="time-display">22:00</div>
                    
                    <div class="playback-buttons">
                        <button id="step-back" class="control-btn-small" title="Reculer de 2 minutes">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/>
                            </svg>
                        </button>
                        
                        <button id="play-pause" class="control-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </button>
                        
                        <button id="step-forward" class="control-btn-small" title="Avancer de 2 minutes">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="speed-selector">
                        <select id="playback-speed">
                            <option value="1">1x</option>
                            <option value="2" selected>2x</option>
                            <option value="5">5x</option>
                            <option value="10">10x</option>
                            <option value="20">20x</option>
                        </select>
                    </div>
                </div>
                
                <div class="timeline-row-2">
                    <span class="slider-label-left">22:00</span>
                    <input 
                        type="range" 
                        id="time-slider" 
                        min="0" 
                        max="100" 
                        value="0"
                        step="1"
                    >
                    <span class="slider-label-right">16:30</span>
                </div>
            </div>
        
            <!-- Carte -->
            <div class="map-container">
                <div id="map"></div>
                <div class="map-legend">
                    <div class="legend-grid">
                        <div class="legend-col">
                            <div class="legend-col-title">Courses</div>
                            <div class="legend-item"><div class="legend-shape marker-circle"></div><span>A1</span></div>
                            <div class="legend-item"><div class="legend-shape marker-square"></div><span>A2</span></div>
                            <div class="legend-item"><div class="legend-shape marker-diamond"></div><span>Z1</span></div>
                            <div class="legend-item"><div class="legend-shape marker-triangle"></div><span>Z2</span></div>
                        </div>
                        <div class="legend-col">
                            <div class="legend-col-title">Départs</div>
                            <div class="legend-wave" style="background:#02d8fd">22:00 / 03:30</div>
                            <div class="legend-wave" style="background:#f71212">22:45 / 04:00</div>
                            <div class="legend-wave" style="background:#f59e0b">23:30 / 04:30</div>
                            <div class="legend-wave" style="background:#0fd420">00:15 / 05:00</div>
                            <div class="legend-wave" style="background:#0452ce">01:00 / 06:00</div>
                            <div class="legend-wave" style="background:#6e33f7">02:00 / 06:30</div>
                            <div class="legend-wave" style="background:#FF1D8D">03:00</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Profil d'altitude -->
            <div class="elevation-container">
                <div id="elevation-profile"></div>
            </div>
        </main>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loader">
            <div class="loader-spinner"></div>
            <p>Chargement des données...</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet-gpx@1.7.0/gpx.js"
            integrity="sha256-mKU5kXr4zrRn2KJJy9Nt9ON3XhvWPthg7YG4Rpx7b7A=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"
            integrity="sha256-7eJpOkpqUSa501ZpBis1jsq2rnubhqHPMC/rRahRSQc=" crossorigin="anonymous"></script>
    <script>
        const _getContext = HTMLCanvasElement.prototype.getContext;
        HTMLCanvasElement.prototype.getContext = function(type, options) {
            if (type === '2d') options = { ...options, willReadFrequently: true };
            return _getContext.call(this, type, options);
        };
    </script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"
            integrity="sha256-f0kw66j4VB2+wo3KW9X3h/ju8c3gNprJZXtwvtIws+A=" crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>
</html>
